name: violin_practice_companion
description: "Violin practice companion with MusicXML display in staff, jianpu, and fingering notation."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  xml: ^6.5.0
  webview_flutter: ^4.10.0
  webview_flutter_web: ^0.2.3+4
  web: ^1.1.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/fixtures/
    - assets/fixtures/sections/
    - assets/lookup_tables/
    - assets/osmd/
