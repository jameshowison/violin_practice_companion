async function render(containerId, applyTight) {
  const opts = {
    autoResize: false,
    drawTitle: false,
    drawSubtitle: false,
    drawPartNames: false,
    drawMeasureNumbers: false,
    newSystemFromXML: true,
    stretchLastSystemLine: true,
  };
  const osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay(containerId, opts);
  osmd.EngravingRules.RenderClefsAtBeginningOfStaffline = false;
  if (applyTight) {
    osmd.EngravingRules.MinSkyBottomDistBetweenSystems = 1.0;
  }
  await osmd.load(xml);
  osmd.render();
}
